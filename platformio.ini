; PlatformIO configuration for Smart Fridge Cam
;
; Board: ESP32-S3-N16R8 with OV5640 camera
; Framework: Arduino
;
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 16MB flash, 8MB PSRAM (N16R8 module)
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; PSRAM enabled (required for 5MP framebuffer)
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Camera pin definitions — adjust for your board variant
    ; These are typical for Freenove ESP32-S3-WROOM:
    -DCAM_PIN_PWDN=-1
    -DCAM_PIN_RESET=-1
    -DCAM_PIN_XCLK=15
    -DCAM_PIN_SIOD=4
    -DCAM_PIN_SIOC=5
    -DCAM_PIN_D7=16
    -DCAM_PIN_D6=17
    -DCAM_PIN_D5=18
    -DCAM_PIN_D4=12
    -DCAM_PIN_D3=10
    -DCAM_PIN_D2=8
    -DCAM_PIN_D1=9
    -DCAM_PIN_D0=11
    -DCAM_PIN_VSYNC=6
    -DCAM_PIN_HREF=7
    -DCAM_PIN_PCLK=13

monitor_speed = 115200
upload_speed = 921600

; Uncomment for OTA uploads (v2)
; upload_protocol = espota
; upload_port = <esp32-ip>
