; PlatformIO configuration for Smart Fridge Cam
;
; Board: Freenove ESP32-S3-WROOM with OV2640 (proto) / OV5640 (prod)
; Framework: Arduino
;
; Build:   pio run
; Upload:  pio run --target upload
; Monitor: pio device monitor

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; 16MB flash, 8MB PSRAM (N16R8 module)
; NOTE: Flash stays at default 8MB partition (only 11.9% used)
; NOTE: qio_opi causes boot loop on this board — flash needs DIO mode
board_build.arduino.memory_type = dio_opi

; PSRAM enabled (required for camera framebuffer)
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -Iinclude
    ; Camera pin definitions — Freenove ESP32-S3-WROOM
    -DCAM_PIN_PWDN=-1
    -DCAM_PIN_RESET=-1
    -DCAM_PIN_XCLK=15
    -DCAM_PIN_SIOD=4
    -DCAM_PIN_SIOC=5
    -DCAM_PIN_D7=16
    -DCAM_PIN_D6=17
    -DCAM_PIN_D5=18
    -DCAM_PIN_D4=12
    -DCAM_PIN_D3=10
    -DCAM_PIN_D2=8
    -DCAM_PIN_D1=9
    -DCAM_PIN_D0=11
    -DCAM_PIN_VSYNC=6
    -DCAM_PIN_HREF=7
    -DCAM_PIN_PCLK=13

lib_deps =
    espressif/esp32-camera @ ^2.0.0

monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; Uncomment for OTA uploads (v2)
; upload_protocol = espota
; upload_port = <esp32-ip>
